# =============================================================================
# One RPM — Docker Compose (Production)
# =============================================================================
# Usage:
#   Production:  docker compose --profile production up -d
#   Development: docker compose up -d  (uses docker-compose.override.yml)
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"

x-app-base: &app-base
  build:
    context: .
    dockerfile: docker/app/Dockerfile
    target: production
  restart: unless-stopped
  env_file: .env
  logging: *default-logging
  networks:
    - onerpm

services:
  # ── Laravel Octane (Swoole) ──────────────────────────────────────────────
  app:
    <<: *app-base
    container_name: onerpm-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── Nginx (Reverse Proxy) ───────────────────────────────────────────────
  nginx:
    container_name: onerpm-nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      app:
        condition: service_healthy
    logging: *default-logging
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ./frontend/dist/frontend/browser:/var/www/frontend:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - onerpm

  # ── Certbot (SSL) ──────────────────────────────────────────────────────
  certbot:
    container_name: onerpm-certbot
    image: certbot/certbot:v3.1.0
    profiles:
      - production
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $$!; done'
    networks:
      - onerpm

  # ── Queue Workers (Supervisor) ─────────────────────────────────────────
  worker:
    <<: *app-base
    container_name: onerpm-worker
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      QUEUE_WORKERS: "${QUEUE_WORKERS:-4}"
      RUN_MIGRATIONS: "false"
    command: ["/usr/bin/supervisord", "-n", "-c", "/var/www/docker/app/supervisord.conf"]
    healthcheck:
      test: ["CMD", "php", "/var/www/artisan", "queue:monitor", "default"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    container_name: onerpm-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD:-secret}
    logging: *default-logging
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - onerpm

  # ── MySQL ──────────────────────────────────────────────────────────────
  mysql:
    container_name: onerpm-mysql
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: America/Sao_Paulo
    logging: *default-logging
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/my.cnf:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - onerpm

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  certbot-conf:
    driver: local
  certbot-www:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  onerpm:
    driver: bridge
