# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;

# Upstream — Octane via Swoole
upstream octane {
    server app:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /var/www/frontend;
    index index.html;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # Client body
    client_max_body_size 55M;

    # API routes → Octane
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://octane;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health endpoint (bypass rate limit)
    location = /up {
        proxy_pass http://octane;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # Static assets with long cache
    location ~* \.(css|js|ico|gif|jpeg|jpg|png|webp|woff2?|ttf|svg)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — serve index.html for Angular routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
