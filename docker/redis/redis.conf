# Redis configuration for Laravel (cache + queue + session)

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — AOF (durability for queues/sessions)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Persistence — RDB (periodic snapshots)
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice

# Security
protected-mode no
# requirepass will be set via command line arg

# Performance
hz 10
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
