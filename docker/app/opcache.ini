; ==============================================
; OPcache Configuration for Swoole/Octane
; ==============================================
; Swoole keeps the process alive, so OPcache preloading
; is highly effective — scripts are compiled once.

[opcache]
opcache.enable = 1
opcache.enable_cli = 1

; Memory
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 64
opcache.max_accelerated_files = 20000

; Revalidation (disabled in prod — Octane caches in memory)
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

; Optimization level (all passes)
opcache.optimization_level = 0x7FFEBFFF

; JIT (tracing mode for best performance)
opcache.jit = tracing
opcache.jit_buffer_size = 128M

; Save comments for annotations/reflection
opcache.save_comments = 1
